name: Release EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build and publish Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build onefile exe
        run: pyinstaller --clean --noconfirm codexsync.spec

      - name: Prepare release assets
        shell: powershell
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "codexsync-${version}-windows-amd64.zip"
          Compress-Archive -Path "dist/codexsync.exe" -DestinationPath "dist/$zipName" -Force
          $hash = (Get-FileHash "dist/$zipName" -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Out-File -FilePath "dist/$zipName.sha256" -Encoding ascii

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codexsync-windows-exe-${{ github.ref_name }}
          path: |
            dist/codexsync-${{ github.ref_name }}-windows-amd64.zip
            dist/codexsync-${{ github.ref_name }}-windows-amd64.zip.sha256

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/codexsync-${{ github.ref_name }}-windows-amd64.zip
            dist/codexsync-${{ github.ref_name }}-windows-amd64.zip.sha256
          generate_release_notes: true
