name: Release EXE

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to build and publish (for example v0.1.2)"
        required: true
        default: "v0.1.2"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-exe:
    name: Build and publish Windows EXE
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE
        shell: powershell
        run: |
          if (Test-Path "codexsync.spec") {
            pyinstaller --clean --noconfirm codexsync.spec
          } else {
            @'
from codexsync.cli import main

if __name__ == "__main__":
    raise SystemExit(main())
'@ | Out-File -FilePath ".github\pyinstaller_entrypoint.py" -Encoding ascii

            pyinstaller --clean --noconfirm --onefile --name codexsync --paths src --add-data "src/codexsync/config.example.toml;codexsync" .github/pyinstaller_entrypoint.py
          }

      - name: Pack release assets
        shell: powershell
        run: |
          $version = "${{ env.RELEASE_TAG }}"
          $zipName = "codexsync-$version-windows-amd64.zip"
          Compress-Archive -Path "dist/codexsync.exe" -DestinationPath "dist/$zipName" -Force
          $hash = (Get-FileHash "dist/$zipName" -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Out-File -FilePath "dist/$zipName.sha256" -Encoding ascii

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codexsync-windows-exe-${{ env.RELEASE_TAG }}
          path: |
            dist/codexsync-${{ env.RELEASE_TAG }}-windows-amd64.zip
            dist/codexsync-${{ env.RELEASE_TAG }}-windows-amd64.zip.sha256

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/codexsync-${{ env.RELEASE_TAG }}-windows-amd64.zip
            dist/codexsync-${{ env.RELEASE_TAG }}-windows-amd64.zip.sha256
